<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Livros — Biblioteca</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="sidebar">
    <h2 style="color:white;margin-bottom:20px">Biblioteca</h2>
    <a href="users.html">Usuários</a>
    <a href="books.html" class="active">Livros</a>
    <a href="loans.html">Empréstimos</a>
    <a href="reports.html">Relatórios</a>
  </nav>
  <div class="main">
    <div id="notification" class="notification"></div>
    <h1>Livros</h1>
    <div class="card">
      <form id="book-form">
        <label for="title">Título</label>
        <input type="text" id="title" placeholder="Título do livro" required>
        <button type="submit">Cadastrar</button>
      </form>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr><th>ID</th><th>Título</th><th>Disponível</th></tr>
        </thead>
        <tbody id="books-table-body"></tbody>
      </table>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/books.js"></script>
</body>
</html>
