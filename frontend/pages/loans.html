<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Empréstimos — Biblioteca</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="sidebar">
    <h2 style="color:white;margin-bottom:20px">Biblioteca</h2>
    <a href="users.html">Usuários</a>
    <a href="books.html">Livros</a>
    <a href="loans.html" class="active">Empréstimos</a>
    <a href="reports.html">Relatórios</a>
  </nav>
  <div class="main">
    <div id="notification" class="notification"></div>
    <h1>Empréstimos</h1>
    <div class="card">
      <form id="loan-form">
        <label for="user-select">Usuário</label>
        <select id="user-select" required>
          <option value="">Selecione um usuário</option>
        </select>
        <label for="book-select">Livro Disponível</label>
        <select id="book-select" required>
          <option value="">Selecione um livro</option>
        </select>
        <button type="submit">Emprestar</button>
      </form>
    </div>
    <div class="card">
      <h2 style="margin-bottom:12px">Empréstimos Ativos</h2>
      <table>
        <thead>
          <tr><th>Usuário</th><th>Livro</th><th>Data do Empréstimo</th><th>Ação</th></tr>
        </thead>
        <tbody id="loans-table-body"></tbody>
      </table>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/loans.js"></script>
</body>
</html>
