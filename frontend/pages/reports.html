<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatórios — Biblioteca</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="sidebar">
    <h2 style="color:white;margin-bottom:20px">Biblioteca</h2>
    <a href="users.html">Usuários</a>
    <a href="books.html">Livros</a>
    <a href="loans.html">Empréstimos</a>
    <a href="reports.html" class="active">Relatórios</a>
  </nav>
  <div class="main">
    <div id="notification" class="notification"></div>
    <h1>Relatórios</h1>
    <div class="card">
      <button id="btn-overdue">Ver Inadimplentes</button>
      <table style="margin-top:16px">
        <thead>
          <tr><th>Usuário</th><th>Livro</th><th>Dias de Atraso</th><th>Multa Estimada</th></tr>
        </thead>
        <tbody id="overdue-table-body"></tbody>
      </table>
    </div>
    <div class="card">
      <button id="btn-popular">Livros Populares</button>
      <table style="margin-top:16px">
        <thead>
          <tr><th>Livro</th><th>Total de Empréstimos</th></tr>
        </thead>
        <tbody id="popular-table-body"></tbody>
      </table>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/reports.js"></script>
</body>
</html>
