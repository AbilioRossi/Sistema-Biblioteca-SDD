<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários — Biblioteca</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="sidebar">
    <h2 style="color:white;margin-bottom:20px">Biblioteca</h2>
    <a href="users.html" class="active">Usuários</a>
    <a href="books.html">Livros</a>
    <a href="loans.html">Empréstimos</a>
    <a href="reports.html">Relatórios</a>
  </nav>
  <div class="main">
    <div id="notification" class="notification"></div>
    <h1>Usuários</h1>
    <div class="card">
      <form id="user-form">
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Nome do usuário" required>
        <button type="submit">Cadastrar</button>
      </form>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr><th>ID</th><th>Nome</th><th>Empréstimos Ativos</th></tr>
        </thead>
        <tbody id="users-table-body"></tbody>
      </table>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/users.js"></script>
</body>
</html>
